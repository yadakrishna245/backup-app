<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Backup App</title>

    <!-- 🔥 Cache Fix -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .section {
            margin: 20px 0;
        }

        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>☁️ Backup App</h1>

    <!-- Upload Section -->
    <div class="section">
        <div class="icon">📤</div>
        <h3>Upload File</h3>
        <input type="file" id="file"/>
        <button onclick="upload()">Upload</button>
        <div id="uploadStatus" class="status"></div>
    </div>

    <!-- Restore Section -->
    <div class="section">
        <div class="icon">📥</div>
        <h3>Restore File</h3>
        <input type="text" id="filename" placeholder="Enter filename"/>
        <button onclick="restore()">Download</button>
        <div id="restoreStatus" class="status"></div>
    </div>

    <div class="footer">
        Version 2.0 🚀
    </div>
</div>

<script>
function upload() {
    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    fetch("/upload?v=2", {
        method: "POST",
        body: formData
    })
    .then(res => {
        if (res.ok) {
            document.getElementById("uploadStatus").innerHTML = "<span class='success'>✅ File uploaded successfully!</span>";
        } else {
            throw new Error();
        }
    })
    .catch(() => {
        document.getElementById("uploadStatus").innerHTML = "<span class='error'>❌ Upload failed!</span>";
    });
}

function restore() {
    let name = document.getElementById("filename").value;

    if (!name) {
        alert("Enter filename");
        return;
    }

    fetch("/restore/" + name + "?v=2")
    .then(res => {
        if (!res.ok) throw new Error();
        return res.blob();
    })
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.click();

        document.getElementById("restoreStatus").innerHTML = "<span class='success'>✅ File downloaded!</span>";
    })
    .catch(() => {
        document.getElementById("restoreStatus").innerHTML = "<span class='error'>❌ File not found!</span>";
    });
}
</script>

</body>
</html>
