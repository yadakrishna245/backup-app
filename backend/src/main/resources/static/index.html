<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backup App Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Card */
.container {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    width: 380px;
    color: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    text-align: center;
}

/* Title */
h1 {
    margin-bottom: 20px;
}

/* Drag Drop Box */
.drop-area {
    border: 2px dashed rgba(255,255,255,0.5);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
    transition: 0.3s;
}

.drop-area:hover {
    background: rgba(255,255,255,0.1);
}

input[type="file"] {
    display: none;
}

.btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    width: 100%;
    margin-top: 10px;
    cursor: pointer;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Input */
input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
}

/* Progress Bar */
.progress {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    margin-top: 10px;
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

/* Status */
.status {
    margin-top: 10px;
    font-size: 14px;
}

</style>
</head>

<body>

<div class="container">
    <h1>☁️ Backup Pro</h1>

    <!-- Upload -->
    <div class="drop-area" onclick="fileInput.click()">
        <p>📂 Drag & Drop or Click</p>
        <input type="file" id="fileInput">
    </div>

    <button class="btn" onclick="upload()">Upload</button>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status" id="uploadStatus"></div>

    <!-- Restore -->
    <h3 style="margin-top:20px;">🔄 Restore File</h3>
    <input type="text" id="filename" placeholder="Enter filename">
    <button class="btn" onclick="restore()">Download</button>

    <div class="status" id="restoreStatus"></div>

</div>

<script>
let fileInput = document.getElementById("fileInput");
let progressBar = document.getElementById("progressBar");

/* Drag Drop Support */
document.querySelector(".drop-area").addEventListener("dragover", e => {
    e.preventDefault();
});

document.querySelector(".drop-area").addEventListener("drop", e => {
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
});

/* Upload with Progress */
function upload() {
    let file = fileInput.files[0];
    if (!file) return alert("Select file");

    let formData = new FormData();
    formData.append("file", file);

    let xhr = new XMLHttpRequest();
    xhr.open("POST", "/upload");

    xhr.upload.onprogress = function(e) {
        let percent = (e.loaded / e.total) * 100;
        progressBar.style.width = percent + "%";
    };

    xhr.onload = () => {
        document.getElementById("uploadStatus").innerText = "✅ Uploaded!";
    };

    xhr.onerror = () => {
        document.getElementById("uploadStatus").innerText = "❌ Failed!";
    };

    xhr.send(formData);
}

/* Restore */
function restore() {
    let name = document.getElementById("filename").value;

    fetch("/restore/" + name)
    .then(res => res.blob())
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.click();

        document.getElementById("restoreStatus").innerText = "✅ Downloaded!";
    })
    .catch(() => {
        document.getElementById("restoreStatus").innerText = "❌ Not found!";
    });
}
</script>

</body>
</html>
