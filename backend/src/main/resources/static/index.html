<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backup App - Secure Your Data</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* 🌌 Galaxy Background */
body {
    height: 100vh;
    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
        url('https://images.pexels.com/photos/207529/pexels-photo-207529.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Glass Container */
.container {
    backdrop-filter: blur(20px);
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    width: 400px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0, 198, 255, 0.3);
}

/* Title */
h1 {
    margin-bottom: 10px;
}

/* Description */
.desc {
    font-size: 13px;
    margin-bottom: 20px;
    color: #ccc;
}

/* Inputs */
input[type="file"],
input[type="text"] {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-top: 8px;
    cursor: pointer;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Progress */
.progress {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    margin-top: 10px;
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

/* Status */
.status {
    margin-top: 8px;
    font-size: 13px;
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">

    <h1>☁️ Backup App</h1>

    <div class="desc">
        🔐 Keep your files safe, secure, and always accessible.  
        Backup today to avoid losing important data tomorrow.
    </div>

    <!-- Upload File -->
    <h3>📄 Upload File</h3>
    <input type="file" id="file">
    <button onclick="uploadFiles()">Upload Files</button>

    <!-- Upload Folder -->
    <h3 style="margin-top:15px;">📂 Upload Folder</h3>
    <input type="file" id="folder" webkitdirectory multiple>
    <button onclick="uploadFolder()">Upload Folder</button>

    <!-- Progress -->
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="uploadStatus" class="status"></div>

    <!-- Restore -->
    <h3 style="margin-top:15px;">📥 Restore File</h3>
    <input type="text" id="filename" placeholder="Enter filename">
    <button onclick="restore()">Download</button>

    <div id="restoreStatus" class="status"></div>

    <!-- Contact -->
    <div class="footer">
        📞 8431825539 | Krishna <br>
        📍 Bangalore, India
    </div>

</div>

<script>
function uploadFiles() {
    let files = document.getElementById("file").files;
    if (files.length === 0) return alert("Select file");
    uploadToServer(files);
}

function uploadFolder() {
    let files = document.getElementById("folder").files;
    if (files.length === 0) return alert("Select folder");
    uploadToServer(files);
}

function uploadToServer(files) {
    let formData = new FormData();

    for (let i = 0; i < files.length; i++) {
        formData.append("files", files[i]);
    }

    let xhr = new XMLHttpRequest();
    xhr.open("POST", "/upload");

    xhr.upload.onprogress = function(e) {
        let percent = (e.loaded / e.total) * 100;
        document.getElementById("progressBar").style.width = percent + "%";
    };

    xhr.onload = function() {
        document.getElementById("uploadStatus").innerText = "✅ Upload successful!";
    };

    xhr.onerror = function() {
        document.getElementById("uploadStatus").innerText = "❌ Upload failed!";
    };

    xhr.send(formData);
}

function restore() {
    let name = document.getElementById("filename").value;
    if (!name) return alert("Enter filename");

    fetch("/restore/" + name)
    .then(res => {
        if (!res.ok) throw new Error();
        return res.blob();
    })
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.click();

        document.getElementById("restoreStatus").innerText = "✅ Downloaded!";
    })
    .catch(() => {
        document.getElementById("restoreStatus").innerText = "❌ File not found!";
    });
}
</script>

</body>
</html>
