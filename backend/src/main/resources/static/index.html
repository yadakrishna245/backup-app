<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backup App - Secure Your Data</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* 🌌 Space Background */
body {
    height: 100vh;
    background: radial-gradient(circle at top, #0f2027, #000000);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Stars */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: transparent url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
    from {background-position: 0 0;}
    to {background-position: 1000px 1000px;}
}

/* Glass Card */
.container {
    position: relative;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 20px;
    width: 380px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

/* Title */
h1 {
    margin-bottom: 10px;
}

/* Description */
.desc {
    font-size: 13px;
    margin-bottom: 20px;
    color: #ccc;
}

/* Inputs */
input[type="file"],
input[type="text"] {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-top: 8px;
    cursor: pointer;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Status */
.status {
    margin-top: 8px;
    font-size: 13px;
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #aaa;
}

</style>
</head>

<body>

<div class="container">

    <h1>☁️ Backup App</h1>

    <div class="desc">
        🔐 Keep your files safe, secure, and always accessible.  
        Backup today to avoid losing important data tomorrow.
    </div>

    <!-- Upload -->
    <h3>📤 Upload File</h3>
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
    <div id="uploadStatus" class="status"></div>

    <!-- Restore -->
    <h3 style="margin-top:15px;">📥 Restore File</h3>
    <input type="text" id="filename" placeholder="Enter filename">
    <button onclick="restore()">Download</button>
    <div id="restoreStatus" class="status"></div>

    <!-- Contact -->
    <div class="footer">
        📞 8431825539 | Krishna <br>
        📍 Bangalore, India
    </div>

</div>

<script>
function upload() {
    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    fetch("/upload", {
        method: "POST",
        body: formData
    })
    .then(res => {
        document.getElementById("uploadStatus").innerText = "✅ Uploaded successfully!";
    })
    .catch(() => {
        document.getElementById("uploadStatus").innerText = "❌ Upload failed!";
    });
}

function restore() {
    let name = document.getElementById("filename").value;

    if (!name) {
        alert("Enter filename");
        return;
    }

    fetch("/restore/" + name)
    .then(res => res.blob())
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.click();

        document.getElementById("restoreStatus").innerText = "✅ Downloaded!";
    })
    .catch(() => {
        document.getElementById("restoreStatus").innerText = "❌ File not found!";
    });
}
</script>

</body>
</html>
